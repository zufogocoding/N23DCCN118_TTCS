services:
 backend:
    build: .
    ports:
     - '9000:9000'
    depends_on:
     - db
 db:
    image: postgres:latest
    environment:
     - POSTGRES_USER=${DB_USER}
     - POSTGRES_PASSWORD=${DB_PASSWORD}
     - POSTGRES_DB=${DB_NAME}
    volumes:
     - postgres_data:/var/lib/postgresql/data:Z
    ports:
    - "5432:5432"

volumes:
  postgres_data:
