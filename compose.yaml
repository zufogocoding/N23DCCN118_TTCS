services:
 backend:
    build: .
    ports:
     - '9000:9000'
    depends_on:
     - db
    environment:
     - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
 db:
    image: postgres:18-alpine
    environment:
     - POSTGRES_USER=${DB_USER}
     - POSTGRES_PASSWORD=${DB_PASSWORD}
     - POSTGRES_DB=${DB_NAME}
    volumes:
     - postgres_data:/var/lib/postgresql/data:Z
    ports:
    - "5433:5432"

volumes:
  postgres_data:
